<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS3 Python Practice — Advanced</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --accent: #ff7043;          /* orange for advanced */
    --accent-light: #ffa270;
    --green: #4caf50;
    --green-bg: #1b3a1b;
    --red: #ef5350;
    --red-bg: #3a1b1b;
    --text: #e8e8f0;
    --text-dim: #9a9ab0;
    --border: #2e3145;
    --code-bg: #12141c;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Top Bar ---- */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar h1 .level-tag {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .topbar h1 span.icon { font-size: 22px; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-outer {
    width: 200px;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 13px;
    color: var(--text-dim);
    min-width: 90px;
    text-align: right;
  }
  .score-badge {
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-light);
  }

  /* ---- Layout ---- */
  .main-container {
    display: flex;
    height: calc(100vh - 53px);
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .topic-group { margin-bottom: 16px; }
  .topic-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-light);
    padding: 8px 16px 4px;
    font-weight: 700;
  }
  .sidebar-item {
    padding: 8px 16px 8px 28px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    color: var(--text-dim);
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active {
    background: var(--surface2);
    color: var(--text);
    font-weight: 600;
  }
  .sidebar-item .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .sidebar-item .status-dot.completed { background: var(--green); }
  .sidebar-item .status-dot.wrong { background: var(--red); }

  /* ---- Content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
  }

  .exercise-header {
    margin-bottom: 24px;
  }
  .exercise-header .tag {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 600;
    margin-right: 6px;
  }
  .exercise-header .tag.fill { background: #e67e22; }
  .exercise-header .tag.code { background: var(--accent); }
  .exercise-header .tag.diff {
    background: var(--surface2);
    color: var(--accent-light);
    border: 1px solid var(--accent);
  }
  .exercise-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .exercise-header p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ---- Task Box ---- */
  .task-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .task-box h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--accent-light);
  }
  .task-box p, .task-box ul {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
  }
  .task-box ul { padding-left: 20px; }
  .task-box li { margin-bottom: 4px; }
  .task-box code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: #e8d44d;
  }

  /* ---- Code Editor Area ---- */
  .editor-area {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .editor-tab-bar {
    background: var(--surface);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .editor-tab-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
  .editor-tab-bar .dot.r { background: #ff5f57; }
  .editor-tab-bar .dot.y { background: #ffbd2e; }
  .editor-tab-bar .dot.g { background: #28c840; }
  .editor-tab-bar span { margin-left: 8px; }

  /* Fill-in-the-blank editor */
  .fill-editor {
    padding: 20px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 2;
    color: var(--text);
  }
  .fill-editor .code-line {
    white-space: pre;
    display: block;
  }
  .fill-editor input.blank {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 4px;
    color: #fff;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    padding: 2px 8px;
    width: auto;
    min-width: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .fill-editor input.blank:focus {
    border-color: var(--accent);
  }
  .fill-editor input.blank.correct {
    border-color: var(--green);
    background: var(--green-bg);
  }
  .fill-editor input.blank.wrong {
    border-color: var(--red);
    background: var(--red-bg);
  }

  /* Full code editor */
  textarea.code-editor {
    width: 100%;
    min-height: 200px;
    background: var(--code-bg);
    color: var(--text);
    border: none;
    padding: 20px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    tab-size: 4;
  }

  /* ---- Expected Output ---- */
  .expected-output {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .expected-output h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .expected-output pre {
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: var(--green);
    white-space: pre-wrap;
  }

  /* ---- Buttons ---- */
  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-check {
    background: var(--accent);
    color: #fff;
  }
  .btn-check:hover { background: var(--accent-light); }
  .btn-next {
    background: var(--green);
    color: #fff;
  }
  .btn-next:hover { opacity: 0.9; }
  .btn-prev {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-prev:hover { background: var(--surface); }
  .btn-hint {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    margin-left: auto;
  }
  .btn-hint:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---- Feedback ---- */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.success {
    display: block;
    background: var(--green-bg);
    border: 1px solid var(--green);
    color: #81c784;
  }
  .feedback.error {
    display: block;
    background: var(--red-bg);
    border: 1px solid var(--red);
    color: #ef9a9a;
  }
  .feedback.hint {
    display: block;
    background: #1b2a3a;
    border: 1px solid #2196f3;
    color: #90caf9;
  }

  /* ---- Completion Screen ---- */
  .completion-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex: 1;
    padding: 40px;
  }
  .completion-screen.show { display: flex; }
  .completion-screen .trophy { font-size: 64px; margin-bottom: 20px; }
  .completion-screen h2 { font-size: 28px; margin-bottom: 12px; }
  .completion-screen p { color: var(--text-dim); font-size: 16px; margin-bottom: 8px; }
  .completion-screen .final-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--accent-light);
    margin: 20px 0;
  }
  .btn-restart {
    background: var(--accent);
    color: #fff;
    margin-top: 20px;
  }

  @media (max-width: 800px) {
    .sidebar { display: none; }
    .content { padding: 20px 16px; }
    .progress-bar-outer { width: 120px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="icon">&#128293;</span> KS3 Python Practice <span class="level-tag">Advanced</span></h1>
  <div class="progress-wrap">
    <div class="score-badge" id="scoreBadge">Score: 0 / 0</div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 20</div>
  </div>
</div>

<div class="main-container">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="mainContent"></main>
</div>

<script>
// ===================== EXERCISE DATA =====================
const exercises = [

  // ---- TOPIC 1: OPERATORS (// % **) ----
  {
    id: 1, topic: "Operators", type: "fill",
    title: "Integer Division",
    description: "The <code>//</code> operator does <strong>integer division</strong> (whole number only — throws away the remainder).",
    lines: [
      { before: 'result = 17 ', blank: '//', after: ' 5' },
      { before: 'print(result)', blank: '', after: '' }
    ],
    hint: "Use two forward slashes //. 17 divided by 5 gives 3 (remainder thrown away).",
    expectedOutput: "3"
  },
  {
    id: 2, topic: "Operators", type: "fill",
    title: "Modulo (Remainder)",
    description: "The <code>%</code> operator gives the <strong>remainder</strong> after division. Great for checking if a number is even or odd!",
    lines: [
      { before: 'number = 23', blank: '', after: '' },
      { before: 'remainder = number ', blank: '%', after: ' 5' },
      { before: 'print(', blank: 'remainder', after: ')' }
    ],
    hint: "Use the % symbol. 23 divided by 5 is 4 remainder 3.",
    expectedOutput: "3"
  },
  {
    id: 3, topic: "Operators", type: "code",
    title: "Even or Odd Checker",
    description: "Ask the user <code>\"Enter a number: \"</code>, convert to int. Use the <code>%</code> operator to check if it's even (remainder of 0 when divided by 2). Print <code>\"Even\"</code> or <code>\"Odd\"</code>.",
    starterCode: '# Check if number is even or odd\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask for the number" },
      { type: "contains", value: 'int', msg: "Convert the input to int" },
      { type: "contains", value: '%', msg: "Use the % operator to get the remainder" },
      { type: "contains", value: '2', msg: "Divide by 2 to check even/odd" },
      { type: "contains", value: 'if', msg: "Use an if statement" },
      { type: "contains", value: 'Even', msg: 'Print "Even" for even numbers' },
      { type: "contains", value: 'Odd', msg: 'Print "Odd" for odd numbers' }
    ],
    hint: "if number % 2 == 0: print(\"Even\") else: print(\"Odd\")",
    expectedOutput: "Enter a number: \nEven / Odd"
  },

  // ---- TOPIC 2: F-STRINGS ----
  {
    id: 4, topic: "F-Strings", type: "fill",
    title: "Formatted Strings",
    description: "An <code>f-string</code> lets you embed variables directly inside text using <code>{ }</code>. Place <code>f</code> before the quote.",
    lines: [
      { before: 'name = "Sam"', blank: '', after: '' },
      { before: 'age = 13', blank: '', after: '' },
      { before: 'print(', blank: 'f', after: '"My name is {name} and I am {age}")' }
    ],
    hint: "The letter that turns a string into an f-string goes before the opening quote: f\"...\"",
    expectedOutput: "My name is Sam and I am 13"
  },
  {
    id: 5, topic: "F-Strings", type: "code",
    title: "Greet and Announce",
    description: "Ask for the user's <code>name</code> and <code>favourite_food</code>. Use an <strong>f-string</strong> to print: <code>Hi [name]! You love [favourite_food].</code>",
    starterCode: '# Ask for name and favourite food, then use an f-string\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() for both name and food" },
      { type: "contains", value: 'name', msg: "Use a variable called name" },
      { type: "contains", value: 'favourite_food', msg: "Use a variable called favourite_food" },
      { type: "regex", value: 'f["\\\']', msg: "Use an f-string (prefix a string with f)" },
      { type: "contains", value: '{name}', msg: "Include {name} inside the f-string" },
      { type: "contains", value: '{favourite_food}', msg: "Include {favourite_food} inside the f-string" }
    ],
    hint: 'print(f"Hi {name}! You love {favourite_food}.")',
    expectedOutput: "Hi [name]! You love [food]."
  },

  // ---- TOPIC 3: LOGICAL OPERATORS (and / or / not) ----
  {
    id: 6, topic: "Logical Operators", type: "fill",
    title: "Using 'and'",
    description: "The <code>and</code> operator checks if <strong>both</strong> conditions are True.",
    lines: [
      { before: 'age = 15', blank: '', after: '' },
      { before: 'has_ticket = True', blank: '', after: '' },
      { before: 'if age >= 12 ', blank: 'and', after: ' has_ticket:' },
      { before: '    print("', blank: 'Welcome!', after: '")' }
    ],
    hint: "The keyword that means 'both must be true' is and.",
    expectedOutput: "Welcome!"
  },
  {
    id: 7, topic: "Logical Operators", type: "fill",
    title: "Using 'or'",
    description: "The <code>or</code> operator checks if <strong>at least one</strong> condition is True.",
    lines: [
      { before: 'day = "Saturday"', blank: '', after: '' },
      { before: 'if day == "Saturday" ', blank: 'or', after: ' day == "Sunday":' },
      { before: '    print("It\'s the weekend!")', blank: '', after: '' }
    ],
    hint: "The keyword that means 'either can be true' is or.",
    expectedOutput: "It's the weekend!"
  },
  {
    id: 8, topic: "Logical Operators", type: "code",
    title: "Cinema Ticket Check",
    description: "Ask the user for their <code>age</code> (int) and whether they have a <code>guardian</code> (input <code>\"yes\"</code> or <code>\"no\"</code>). If age is 15 or older, <strong>OR</strong> they have a guardian, print <code>\"You can watch the film\"</code>. Otherwise print <code>\"Sorry, you cannot watch this film\"</code>.",
    starterCode: '# Cinema age check with guardian rule\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() for both questions" },
      { type: "contains", value: 'int', msg: "Convert the age to an int" },
      { type: "contains", value: 'if', msg: "Use an if statement" },
      { type: "contains", value: 'or', msg: "Use the or logical operator" },
      { type: "contains", value: '15', msg: "Check if age is 15 or more" },
      { type: "contains", value: 'You can watch', msg: 'Print "You can watch the film"' },
      { type: "contains", value: 'Sorry', msg: 'Print a "Sorry" message for rejected' }
    ],
    hint: 'if age >= 15 or guardian == "yes":',
    expectedOutput: "You can watch the film / Sorry, you cannot watch this film"
  },

  // ---- TOPIC 4: FOR LOOPS ----
  {
    id: 9, topic: "For Loops", type: "fill",
    title: "Counting with range",
    description: "A <code>for</code> loop with <code>range(n)</code> repeats something <code>n</code> times (from 0 up to n-1).",
    lines: [
      { before: '', blank: 'for', after: ' i in range(5):' },
      { before: '    print(', blank: 'i', after: ')' }
    ],
    hint: "The keyword that starts a loop is for. Print the loop variable i to see it count.",
    expectedOutput: "0\n1\n2\n3\n4"
  },
  {
    id: 10, topic: "For Loops", type: "fill",
    title: "Counting from 1 to 10",
    description: "Use <code>range(start, stop)</code> — remember <code>stop</code> is NOT included!",
    lines: [
      { before: 'for i in ', blank: 'range', after: '(1, 11):' },
      { before: '    print(i)', blank: '', after: '' }
    ],
    hint: "Use range(1, 11) — this counts from 1 up to 10 (11 is excluded).",
    expectedOutput: "1\n2\n3\n...\n10"
  },
  {
    id: 11, topic: "For Loops", type: "code",
    title: "Times Table",
    description: "Ask the user for a number. Use a <code>for</code> loop to print its times table from 1 to 10. For example, if the number is 3, print lines like <code>3 x 1 = 3</code>, <code>3 x 2 = 6</code>, etc. (Use an f-string!)",
    starterCode: '# Print the times table for the number entered\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask for a number" },
      { type: "contains", value: 'int', msg: "Convert the input to int" },
      { type: "contains", value: 'for', msg: "Use a for loop" },
      { type: "contains", value: 'range', msg: "Use range() in your loop" },
      { type: "contains", value: '11', msg: "Use range(1, 11) to go from 1 to 10" },
      { type: "contains", value: '*', msg: "Multiply the number by i using *" },
      { type: "contains", value: 'print', msg: "Print each line of the table" }
    ],
    hint: 'for i in range(1, 11): print(f"{num} x {i} = {num * i}")',
    expectedOutput: "3 x 1 = 3\n3 x 2 = 6\n...\n3 x 10 = 30"
  },

  // ---- TOPIC 5: WHILE LOOPS ----
  {
    id: 12, topic: "While Loops", type: "fill",
    title: "Counting Down",
    description: "A <code>while</code> loop repeats as long as a condition is True. Don't forget to change the variable inside the loop!",
    lines: [
      { before: 'count = 5', blank: '', after: '' },
      { before: '', blank: 'while', after: ' count > 0:' },
      { before: '    print(count)', blank: '', after: '' },
      { before: '    count = count ', blank: '-', after: ' 1' }
    ],
    hint: "Use while to start the loop. Subtract 1 each time using the - operator.",
    expectedOutput: "5\n4\n3\n2\n1"
  },
  {
    id: 13, topic: "While Loops", type: "code",
    title: "Guess Until Correct",
    description: "The secret number is <code>7</code>. Use a <code>while</code> loop to keep asking <code>\"Guess the number: \"</code> until the user enters 7. When they get it right, print <code>\"Correct!\"</code>.",
    starterCode: '# Keep asking until they guess 7\nsecret = 7\n',
    checks: [
      { type: "contains", value: 'while', msg: "Use a while loop" },
      { type: "contains", value: 'input', msg: "Ask the user for input inside the loop" },
      { type: "contains", value: 'int', msg: "Convert the input to int to compare numbers" },
      { type: "contains", value: 'secret', msg: "Compare against the secret variable" },
      { type: "contains", value: 'Correct', msg: 'Print "Correct!" when they guess right' }
    ],
    hint: "guess = 0\nwhile guess != secret:\n    guess = int(input(\"Guess the number: \"))\nprint(\"Correct!\")",
    expectedOutput: "Guess the number: ... (until correct)\nCorrect!"
  },

  // ---- TOPIC 6: LISTS ----
  {
    id: 14, topic: "Lists", type: "fill",
    title: "Creating a List",
    description: "A <strong>list</strong> stores multiple values in order. Use square brackets <code>[ ]</code>.",
    lines: [
      { before: 'fruits = ', blank: '["apple", "banana", "cherry"]', after: '' },
      { before: 'print(fruits[', blank: '0', after: '])' }
    ],
    hint: 'Put values in square brackets, separated by commas. Lists start at index 0!',
    expectedOutput: "apple"
  },
  {
    id: 15, topic: "Lists", type: "fill",
    title: "Looping Through a List",
    description: "A <code>for</code> loop can go through every item in a list.",
    lines: [
      { before: 'colours = ["red", "green", "blue"]', blank: '', after: '' },
      { before: 'for ', blank: 'colour', after: ' in colours:' },
      { before: '    print(', blank: 'colour', after: ')' }
    ],
    hint: "Pick any name for the loop variable (e.g. colour) — it holds each item, one at a time.",
    expectedOutput: "red\ngreen\nblue"
  },
  {
    id: 16, topic: "Lists", type: "code",
    title: "Shopping List Total",
    description: "Create a list called <code>prices</code> containing <code>[3, 5, 2, 8, 4]</code>. Use a <code>for</code> loop to add all the numbers together. Print the result with the message <code>\"Total: £\"</code> followed by the total.",
    starterCode: '# Work out the total of all prices\n',
    checks: [
      { type: "contains", value: 'prices', msg: "Create a list called prices" },
      { type: "contains", value: '[3, 5, 2, 8, 4]', msg: "The list should be [3, 5, 2, 8, 4]" },
      { type: "contains", value: 'for', msg: "Use a for loop to go through the list" },
      { type: "contains", value: '+', msg: "Add each price to a running total" },
      { type: "contains", value: 'print', msg: "Print the final total" },
      { type: "contains", value: 'Total', msg: 'Include the message "Total"' }
    ],
    hint: 'total = 0\nfor price in prices:\n    total = total + price\nprint(f"Total: £{total}")',
    expectedOutput: "Total: £22"
  },

  // ---- TOPIC 7: FUNCTIONS ----
  {
    id: 17, topic: "Functions", type: "fill",
    title: "Your First Function",
    description: "A <code>function</code> is a block of code you can reuse. Use <code>def</code> to create one.",
    lines: [
      { before: '', blank: 'def', after: ' greet():' },
      { before: '    print("Hello there!")', blank: '', after: '' },
      { before: '', blank: 'greet', after: '()' }
    ],
    hint: "The keyword that defines a function is def. To run a function, type its name followed by ().",
    expectedOutput: "Hello there!"
  },
  {
    id: 18, topic: "Functions", type: "fill",
    title: "Functions with Parameters",
    description: "Parameters let you pass information INTO a function. They go in the brackets.",
    lines: [
      { before: 'def greet(', blank: 'name', after: '):' },
      { before: '    print(f"Hello, ', blank: '{name}', after: '!")' },
      { before: 'greet("Alex")', blank: '', after: '' },
      { before: 'greet("Sam")', blank: '', after: '' }
    ],
    hint: "Put the parameter name in the brackets. Then use it inside the function with an f-string.",
    expectedOutput: "Hello, Alex!\nHello, Sam!"
  },
  {
    id: 19, topic: "Functions", type: "code",
    title: "Square Function",
    description: "Create a function called <code>square</code> that takes one parameter <code>n</code> and <code>return</code>s <code>n * n</code>. Then call it with the number <code>6</code> and print the result.",
    starterCode: '# Define the square function, then use it\n',
    checks: [
      { type: "contains", value: 'def', msg: "Use def to define the function" },
      { type: "contains", value: 'square', msg: "Name the function square" },
      { type: "contains", value: 'return', msg: "Use return to send the answer back" },
      { type: "contains", value: '*', msg: "Use * to multiply n by itself" },
      { type: "contains", value: 'square(6)', msg: "Call square(6) somewhere" },
      { type: "contains", value: 'print', msg: "Print the result" }
    ],
    hint: "def square(n):\n    return n * n\nprint(square(6))",
    expectedOutput: "36"
  },

  // ---- FINAL CHALLENGE: combines multiple ideas ----
  {
    id: 20, topic: "Challenge", type: "code",
    title: "Final Challenge: Number Guessing Game",
    description: "Put it all together! The secret number is <code>42</code>. Use a <code>while</code> loop to keep asking the user <code>\"Your guess: \"</code>. If their guess is too low print <code>\"Too low!\"</code>. If too high print <code>\"Too high!\"</code>. When correct, print <code>\"You got it!\"</code> and stop the loop.",
    starterCode: '# Build the number guessing game\nsecret = 42\n',
    checks: [
      { type: "contains", value: 'while', msg: "Use a while loop" },
      { type: "contains", value: 'input', msg: "Ask for input inside the loop" },
      { type: "contains", value: 'int', msg: "Convert input to int" },
      { type: "contains", value: 'if', msg: "Use if to check the guess" },
      { type: "contains", value: 'elif', msg: "Use elif for the middle condition" },
      { type: "contains", value: 'Too low', msg: 'Print "Too low!" for low guesses' },
      { type: "contains", value: 'Too high', msg: 'Print "Too high!" for high guesses' },
      { type: "contains", value: 'You got it', msg: 'Print "You got it!" when correct' }
    ],
    hint: "Start with guess = 0. Loop while guess != secret. Use if/elif/else to compare guess with secret.",
    expectedOutput: "Your guess: 20\nToo low!\nYour guess: 50\nToo high!\nYour guess: 42\nYou got it!"
  }
];

// ===================== STATE =====================
let currentIndex = 0;
let completed = {};
let attempts = {};

// ===================== RENDER SIDEBAR =====================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<h2>Exercises</h2>';
  let currentTopic = '';

  exercises.forEach((ex, i) => {
    if (ex.topic !== currentTopic) {
      currentTopic = ex.topic;
      html += `<div class="topic-group"><div class="topic-label">${currentTopic}</div>`;
    }
    const statusClass = completed[ex.id] === true ? 'completed' : completed[ex.id] === false ? 'wrong' : '';
    const activeClass = i === currentIndex ? 'active' : '';
    html += `<div class="sidebar-item ${activeClass}" onclick="goTo(${i})">
      <span class="status-dot ${statusClass}"></span>
      ${ex.id}. ${ex.title}
    </div>`;
    if (i === exercises.length - 1 || exercises[i + 1].topic !== currentTopic) {
      html += '</div>';
    }
  });

  sb.innerHTML = html;
}

// ===================== RENDER EXERCISE =====================
function renderExercise() {
  const ex = exercises[currentIndex];
  const main = document.getElementById('mainContent');

  const typeTag = ex.type === 'fill'
    ? '<span class="tag fill">Fill in the Blanks</span>'
    : '<span class="tag code">Write Code</span>';
  const diffTag = '<span class="tag diff">Advanced</span>';

  let editorHTML = '';
  if (ex.type === 'fill') {
    let linesHTML = '';
    ex.lines.forEach((line, li) => {
      if (line.blank === '') {
        linesHTML += `<span class="code-line">${escapeHTML(line.before)}${escapeHTML(line.after)}</span>`;
      } else {
        const w = Math.max(line.blank.length * 10 + 20, 80);
        linesHTML += `<span class="code-line">${escapeHTML(line.before)}<input class="blank" data-line="${li}" data-answer="${escapeAttr(line.blank)}" style="width:${w}px" spellcheck="false" autocomplete="off">${escapeHTML(line.after)}</span>`;
      }
    });
    editorHTML = `<div class="fill-editor">${linesHTML}</div>`;
  } else {
    editorHTML = `<textarea class="code-editor" id="codeEditor" spellcheck="false">${escapeHTML(ex.starterCode || '')}</textarea>`;
  }

  let expectedHTML = '';
  if (ex.expectedOutput) {
    expectedHTML = `<div class="expected-output">
      <h4>Expected Output</h4>
      <pre>${escapeHTML(ex.expectedOutput)}</pre>
    </div>`;
  }

  main.innerHTML = `
    <div class="exercise-content">
      <div class="exercise-header">
        ${typeTag}${diffTag}
        <h2>Exercise ${ex.id}: ${ex.title}</h2>
        <p>${ex.description}</p>
      </div>

      <div class="task-box">
        <h3>Your Task</h3>
        <p>${ex.type === 'fill' ? 'Fill in the blanks to complete the code below.' : 'Write the complete code in the editor below.'}</p>
      </div>

      <div class="editor-area">
        <div class="editor-tab-bar">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <span>exercise_${ex.id}.py</span>
        </div>
        ${editorHTML}
      </div>

      ${expectedHTML}

      <div class="btn-row">
        <button class="btn btn-prev" onclick="prev()" ${currentIndex === 0 ? 'disabled' : ''}>Previous</button>
        <button class="btn btn-check" onclick="checkAnswer()">Check Answer</button>
        <button class="btn btn-next" onclick="next()" id="nextBtn">${currentIndex === exercises.length - 1 ? 'Finish' : 'Next'}</button>
        <button class="btn btn-hint" onclick="showHint()">Hint</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>
  `;

  requestAnimationFrame(() => {
    const firstBlank = main.querySelector('input.blank');
    const editor = document.getElementById('codeEditor');
    if (firstBlank) firstBlank.focus();
    else if (editor) editor.focus();
  });

  renderSidebar();
  updateProgress();
}

// ===================== CHECK ANSWER =====================
function checkAnswer() {
  const ex = exercises[currentIndex];
  const fb = document.getElementById('feedback');

  if (ex.type === 'fill') {
    const blanks = document.querySelectorAll('input.blank');
    let allCorrect = true;
    blanks.forEach(b => {
      const answer = b.dataset.answer.trim().toLowerCase().replace(/\s+/g, ' ');
      const userVal = b.value.trim().toLowerCase().replace(/\s+/g, ' ');
      if (userVal === answer) {
        b.classList.remove('wrong');
        b.classList.add('correct');
      } else {
        b.classList.remove('correct');
        b.classList.add('wrong');
        allCorrect = false;
      }
    });

    if (allCorrect) {
      completed[ex.id] = true;
      fb.className = 'feedback success';
      fb.textContent = 'Correct! Well done!';
    } else {
      completed[ex.id] = false;
      fb.className = 'feedback error';
      fb.textContent = 'Not quite right. Check the highlighted blanks and try again.';
    }
  } else {
    const editor = document.getElementById('codeEditor');
    const code = editor.value;

    if (code.trim() === '' || code.trim() === (ex.starterCode || '').trim()) {
      fb.className = 'feedback error';
      fb.textContent = 'Write your code first, then check!';
      return;
    }

    let allPass = true;
    let failMsg = '';
    for (const check of ex.checks) {
      if (check.type === 'contains') {
        if (!code.includes(check.value)) {
          allPass = false;
          failMsg = check.msg;
          break;
        }
      } else if (check.type === 'regex') {
        const re = new RegExp(check.value);
        if (!re.test(code)) {
          allPass = false;
          failMsg = check.msg;
          break;
        }
      }
    }

    if (allPass) {
      completed[ex.id] = true;
      fb.className = 'feedback success';
      fb.textContent = 'Correct! Your code looks great!';
    } else {
      completed[ex.id] = false;
      fb.className = 'feedback error';
      fb.textContent = failMsg || 'Not quite right. Check the requirements and try again.';
    }
  }

  renderSidebar();
  updateProgress();
}

// ===================== HINT =====================
function showHint() {
  const ex = exercises[currentIndex];
  const fb = document.getElementById('feedback');
  fb.className = 'feedback hint';
  fb.textContent = ex.hint;
}

// ===================== NAVIGATION =====================
function goTo(index) { currentIndex = index; renderExercise(); }
function next() {
  if (currentIndex < exercises.length - 1) { currentIndex++; renderExercise(); }
  else { showCompletion(); }
}
function prev() {
  if (currentIndex > 0) { currentIndex--; renderExercise(); }
}

// ===================== PROGRESS =====================
function updateProgress() {
  const total = exercises.length;
  const done = Object.values(completed).filter(v => v === true).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  const totalAttempted = Object.keys(completed).length;
  document.getElementById('scoreBadge').textContent = `Score: ${done} / ${totalAttempted || 0}`;
}

// ===================== COMPLETION =====================
function showCompletion() {
  const total = exercises.length;
  const done = Object.values(completed).filter(v => v === true).length;
  const pct = Math.round((done / total) * 100);
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="completion-screen show">
      <div class="trophy">&#127942;</div>
      <h2>Advanced Course Complete!</h2>
      <p>You've finished all ${total} exercises.</p>
      <div class="final-score">${done} / ${total}</div>
      <p>${pct >= 80 ? "Outstanding! You're ready for harder challenges." : pct >= 50 ? "Great effort! Review the tricky ones and try again." : "Good attempt! Keep practising the concepts you found tough."}</p>
      <button class="btn btn-restart" onclick="restart()">Restart Course</button>
    </div>
  `;
}

function restart() {
  currentIndex = 0;
  completed = {};
  attempts = {};
  renderExercise();
}

// ===================== UTILS =====================
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

renderExercise();
</script>
