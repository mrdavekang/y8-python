<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS3 Python Practice Course</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --accent: #6c63ff;
    --accent-light: #8b83ff;
    --green: #4caf50;
    --green-bg: #1b3a1b;
    --red: #ef5350;
    --red-bg: #3a1b1b;
    --text: #e8e8f0;
    --text-dim: #9a9ab0;
    --border: #2e3145;
    --code-bg: #12141c;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Top Bar ---- */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar h1 span.icon { font-size: 22px; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-outer {
    width: 200px;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 13px;
    color: var(--text-dim);
    min-width: 90px;
    text-align: right;
  }
  .score-badge {
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-light);
  }

  /* ---- Layout ---- */
  .main-container {
    display: flex;
    height: calc(100vh - 53px);
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .topic-group { margin-bottom: 16px; }
  .topic-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-light);
    padding: 8px 16px 4px;
    font-weight: 700;
  }
  .sidebar-item {
    padding: 8px 16px 8px 28px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    color: var(--text-dim);
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active {
    background: var(--surface2);
    color: var(--text);
    font-weight: 600;
  }
  .sidebar-item .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .sidebar-item .status-dot.completed { background: var(--green); }
  .sidebar-item .status-dot.wrong { background: var(--red); }

  /* ---- Content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
  }

  .exercise-header {
    margin-bottom: 24px;
  }
  .exercise-header .tag {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .exercise-header .tag.fill { background: #e67e22; }
  .exercise-header .tag.code { background: var(--accent); }
  .exercise-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .exercise-header p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ---- Task Box ---- */
  .task-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .task-box h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--accent-light);
  }
  .task-box p, .task-box ul {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
  }
  .task-box ul { padding-left: 20px; }
  .task-box li { margin-bottom: 4px; }
  .task-box code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: #e8d44d;
  }

  /* ---- Code Editor Area ---- */
  .editor-area {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .editor-tab-bar {
    background: var(--surface);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .editor-tab-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
  .editor-tab-bar .dot.r { background: #ff5f57; }
  .editor-tab-bar .dot.y { background: #ffbd2e; }
  .editor-tab-bar .dot.g { background: #28c840; }
  .editor-tab-bar span { margin-left: 8px; }

  /* Fill-in-the-blank editor */
  .fill-editor {
    padding: 20px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 2;
    color: var(--text);
  }
  .fill-editor .code-line {
    white-space: pre;
    display: block;
  }
  .fill-editor input.blank {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 4px;
    color: #fff;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    padding: 2px 8px;
    width: auto;
    min-width: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .fill-editor input.blank:focus {
    border-color: var(--accent);
  }
  .fill-editor input.blank.correct {
    border-color: var(--green);
    background: var(--green-bg);
  }
  .fill-editor input.blank.wrong {
    border-color: var(--red);
    background: var(--red-bg);
  }

  /* Full code editor */
  textarea.code-editor {
    width: 100%;
    min-height: 160px;
    background: var(--code-bg);
    color: var(--text);
    border: none;
    padding: 20px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    tab-size: 4;
  }

  /* ---- Expected Output ---- */
  .expected-output {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .expected-output h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .expected-output pre {
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: var(--green);
    white-space: pre-wrap;
  }

  /* ---- Buttons ---- */
  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-check {
    background: var(--accent);
    color: #fff;
  }
  .btn-check:hover { background: var(--accent-light); }
  .btn-next {
    background: var(--green);
    color: #fff;
  }
  .btn-next:hover { opacity: 0.9; }
  .btn-prev {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-prev:hover { background: var(--surface); }
  .btn-hint {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    margin-left: auto;
  }
  .btn-hint:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---- Feedback ---- */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.success {
    display: block;
    background: var(--green-bg);
    border: 1px solid var(--green);
    color: #81c784;
  }
  .feedback.error {
    display: block;
    background: var(--red-bg);
    border: 1px solid var(--red);
    color: #ef9a9a;
  }
  .feedback.hint {
    display: block;
    background: #1b2a3a;
    border: 1px solid #2196f3;
    color: #90caf9;
  }

  /* ---- Completion Screen ---- */
  .completion-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex: 1;
    padding: 40px;
  }
  .completion-screen.show { display: flex; }
  .completion-screen .trophy { font-size: 64px; margin-bottom: 20px; }
  .completion-screen h2 { font-size: 28px; margin-bottom: 12px; }
  .completion-screen p { color: var(--text-dim); font-size: 16px; margin-bottom: 8px; }
  .completion-screen .final-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--accent-light);
    margin: 20px 0;
  }
  .btn-restart {
    background: var(--accent);
    color: #fff;
    margin-top: 20px;
  }

  /* ---- Responsive ---- */
  @media (max-width: 800px) {
    .sidebar { display: none; }
    .content { padding: 20px 16px; }
    .progress-bar-outer { width: 120px; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <h1><span class="icon">&#128013;</span> KS3 Python Practice</h1>
  <div class="progress-wrap">
    <div class="score-badge" id="scoreBadge">Score: 0 / 0</div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 18</div>
  </div>
</div>

<div class="main-container">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main Content -->
  <main class="content" id="mainContent">
    <!-- Exercise content rendered by JS -->
  </main>
</div>

<script>
// ===================== EXERCISE DATA =====================
const exercises = [
  // ---- TOPIC 1: VARIABLES ----
  {
    id: 1, topic: "Variables", type: "fill",
    title: "Storing a Name",
    description: "Variables let us store data. Complete the code to store the name <code>\"Alice\"</code> in a variable called <code>name</code>.",
    lines: [
      { before: '', blank: 'name', after: ' = "Alice"' },
      { before: 'print(', blank: 'name', after: ')' }
    ],
    hint: "A variable is created by writing its name, then = , then the value.",
    expectedOutput: "Alice"
  },
  {
    id: 2, topic: "Variables", type: "fill",
    title: "Storing a Number",
    description: "Store the number <code>25</code> in a variable called <code>age</code>, then print it.",
    lines: [
      { before: 'age = ', blank: '25', after: '' },
      { before: '', blank: 'print', after: '(age)' }
    ],
    hint: "Numbers don't need quotes around them. Use print() to display values.",
    expectedOutput: "25"
  },
  {
    id: 3, topic: "Variables", type: "code",
    title: "Create Two Variables",
    description: "Create a variable <code>subject</code> with the value <code>\"Computing\"</code> and a variable <code>room</code> with the value <code>12</code>. Print both on separate lines.",
    starterCode: '# Create your variables below\n\n\n# Print them\n',
    checks: [
      { type: "contains", value: 'subject', msg: "You need a variable called subject" },
      { type: "contains", value: '"Computing"', msg: "subject should store \"Computing\"" },
      { type: "contains", value: 'room', msg: "You need a variable called room" },
      { type: "contains", value: '12', msg: "room should store 12" },
      { type: "contains", value: 'print', msg: "Use print() to display the values" }
    ],
    hint: "Remember: text values need quotes, numbers don't. Use print(variable_name).",
    expectedOutput: "Computing\n12"
  },

  // ---- TOPIC 2: PRINT ----
  {
    id: 4, topic: "Print", type: "fill",
    title: "Hello World!",
    description: "The <code>print()</code> function displays text on screen. Complete the classic first program!",
    lines: [
      { before: '', blank: 'print', after: '("Hello World!")' }
    ],
    hint: "The function that displays output is called print.",
    expectedOutput: "Hello World!"
  },
  {
    id: 5, topic: "Print", type: "fill",
    title: "Printing Multiple Items",
    description: "You can print text and variables together using commas. Fill in the blanks.",
    lines: [
      { before: 'name = "Bob"', blank: '', after: '' },
      { before: 'print("Hello,", ', blank: 'name', after: ')' }
    ],
    hint: "Put the variable name (without quotes) after the comma inside print().",
    expectedOutput: "Hello, Bob"
  },
  {
    id: 6, topic: "Print", type: "code",
    title: "Your Own Message",
    description: "Write code that prints <code>I am learning Python</code> on the first line and <code>It is fun!</code> on the second line. Use two print statements.",
    starterCode: '# Write your two print statements below\n',
    checks: [
      { type: "output_match", value: 'I am learning Python\nIt is fun!' }
    ],
    hint: "Use two separate print() calls, each with the text in quotes.",
    expectedOutput: "I am learning Python\nIt is fun!"
  },

  // ---- TOPIC 3: INPUT ----
  {
    id: 7, topic: "Input", type: "fill",
    title: "Asking for a Name",
    description: "<code>input()</code> asks the user to type something. Complete the code to ask for the user's name and store it.",
    lines: [
      { before: 'name = ', blank: 'input', after: '("What is your name? ")' },
      { before: 'print("Hello,", ', blank: 'name', after: ')' }
    ],
    hint: "The function that reads user input is called input.",
    expectedOutput: "What is your name? \nHello, [user's name]"
  },
  {
    id: 8, topic: "Input", type: "fill",
    title: "Asking for a Favourite Colour",
    description: "Complete the code so it asks for a colour and prints a message.",
    lines: [
      { before: '', blank: 'colour', after: ' = input("What is your favourite colour? ")' },
      { before: 'print("Nice!", ', blank: 'colour', after: ', "is a great colour!")' }
    ],
    hint: "Store the result of input() in a variable called colour.",
    expectedOutput: "What is your favourite colour? \nNice! [colour] is a great colour!"
  },
  {
    id: 9, topic: "Input", type: "code",
    title: "Ask and Greet",
    description: "Write a program that asks <code>\"What is your hobby? \"</code> and stores the answer in a variable called <code>hobby</code>. Then prints <code>\"Cool! You like\"</code> followed by the hobby.",
    starterCode: '# Ask for the hobby and print the message\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask the user" },
      { type: "contains", value: 'hobby', msg: "Store the answer in a variable called hobby" },
      { type: "contains", value: '"What is your hobby? "', msg: 'The prompt should be exactly "What is your hobby? "' },
      { type: "contains", value: 'print', msg: "Use print() to display the output" }
    ],
    hint: 'Use: hobby = input("What is your hobby? ") then print("Cool! You like", hobby)',
    expectedOutput: 'What is your hobby? \nCool! You like [hobby]'
  },

  // ---- TOPIC 4: DATA TYPES (int, str, float) ----
  {
    id: 10, topic: "Data Types", type: "fill",
    title: "Converting to Integer",
    description: "<code>input()</code> always gives us a <strong>string</strong>. To do maths, we need to convert it to an <strong>integer</strong> using <code>int()</code>.",
    lines: [
      { before: 'age_text = input("Enter your age: ")', blank: '', after: '' },
      { before: 'age = ', blank: 'int', after: '(age_text)' },
      { before: 'print("Next year you will be", age ', blank: '+', after: ' 1)' }
    ],
    hint: "int() converts a string to a whole number. Use + to add numbers.",
    expectedOutput: "Enter your age: \nNext year you will be [age+1]"
  },
  {
    id: 11, topic: "Data Types", type: "fill",
    title: "String or Integer?",
    description: "Fix this code! The number needs to be converted so the addition works properly.",
    lines: [
      { before: 'num1 = ', blank: 'int', after: '(input("Enter a number: "))' },
      { before: 'result = num1 + 10', blank: '', after: '' },
      { before: 'print("Result:", ', blank: 'result', after: ')' }
    ],
    hint: "Wrap input() inside int() to convert the text into a number immediately.",
    expectedOutput: "Enter a number: \nResult: [num + 10]"
  },
  {
    id: 12, topic: "Data Types", type: "code",
    title: "Build a Calculator",
    description: "Ask the user for two numbers (<code>\"Enter number 1: \"</code> and <code>\"Enter number 2: \"</code>). Convert both to integers, add them together, and print the result with the message <code>\"The total is\"</code>.",
    starterCode: '# Ask for two numbers, convert, add, and print\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask for numbers" },
      { type: "contains", value: 'int', msg: "Convert the inputs to integers using int()" },
      { type: "contains", value: '+', msg: "Add the two numbers together using +" },
      { type: "contains", value: 'print', msg: "Print the result" },
      { type: "contains", value: 'The total is', msg: 'Include the message "The total is"' }
    ],
    hint: 'Pattern: num1 = int(input("Enter number 1: "))',
    expectedOutput: 'Enter number 1: \nEnter number 2: \nThe total is [sum]'
  },

  // ---- TOPIC 5: SELECTION (if / elif / else) ----
  {
    id: 13, topic: "Selection", type: "fill",
    title: "Simple If Statement",
    description: "An <code>if</code> statement checks a condition. If it's <strong>True</strong>, the indented code runs.",
    lines: [
      { before: 'temperature = 35', blank: '', after: '' },
      { before: '', blank: 'if', after: ' temperature > 30:' },
      { before: '    print("', blank: "It's hot!", after: '")' }
    ],
    hint: "The keyword that starts a condition check is if. Don't forget the colon at the end!",
    expectedOutput: "It's hot!"
  },
  {
    id: 14, topic: "Selection", type: "fill",
    title: "If / Else",
    description: "Use <code>else</code> to run different code when the condition is <strong>False</strong>.",
    lines: [
      { before: 'score = 40', blank: '', after: '' },
      { before: 'if score >= 50:', blank: '', after: '' },
      { before: '    print("Pass!")', blank: '', after: '' },
      { before: '', blank: 'else', after: ':' },
      { before: '    print("', blank: 'Try again', after: '")' }
    ],
    hint: "else catches everything that didn't match the if condition. It also needs a colon.",
    expectedOutput: "Try again"
  },
  {
    id: 15, topic: "Selection", type: "fill",
    title: "If / Elif / Else",
    description: "Use <code>elif</code> (else if) to check multiple conditions.",
    lines: [
      { before: 'grade = 75', blank: '', after: '' },
      { before: 'if grade >= 90:', blank: '', after: '' },
      { before: '    print("A")', blank: '', after: '' },
      { before: '', blank: 'elif', after: ' grade >= 70:' },
      { before: '    print("B")', blank: '', after: '' },
      { before: 'else:', blank: '', after: '' },
      { before: '    print("', blank: 'C', after: '")' }
    ],
    hint: "elif is short for 'else if'. It checks another condition if the previous one was False.",
    expectedOutput: "B"
  },
  {
    id: 16, topic: "Selection", type: "code",
    title: "Age Checker",
    description: "Ask the user <code>\"Enter your age: \"</code>, convert to an integer. If they are 18 or over, print <code>\"You are an adult\"</code>. Otherwise, print <code>\"You are a minor\"</code>.",
    starterCode: '# Ask for age and check if adult or minor\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask for the age" },
      { type: "contains", value: 'int', msg: "Convert the input to an integer" },
      { type: "contains", value: 'if', msg: "Use an if statement to check the age" },
      { type: "contains", value: '18', msg: "Check against the age 18" },
      { type: "contains", value: 'else', msg: "Use else for the other case" },
      { type: "contains", value: 'You are an adult', msg: 'Print "You are an adult"' },
      { type: "contains", value: 'You are a minor', msg: 'Print "You are a minor"' }
    ],
    hint: "Pattern: age = int(input(...)) then if age >= 18: ... else: ...",
    expectedOutput: 'Enter your age: \nYou are an adult / You are a minor'
  },
  {
    id: 17, topic: "Selection", type: "code",
    title: "Traffic Light",
    description: "Ask the user <code>\"What colour is the light? \"</code>. If they type <code>\"red\"</code>, print <code>\"Stop\"</code>. If <code>\"amber\"</code>, print <code>\"Get ready\"</code>. If <code>\"green\"</code>, print <code>\"Go\"</code>. Otherwise print <code>\"Invalid colour\"</code>.",
    starterCode: '# Traffic light program\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask for the colour" },
      { type: "contains", value: 'if', msg: "Use if to check the first colour" },
      { type: "contains", value: 'elif', msg: "Use elif to check additional colours" },
      { type: "contains", value: 'else', msg: "Use else for invalid input" },
      { type: "contains", value: '"red"', msg: 'Check for "red"' },
      { type: "contains", value: '"amber"', msg: 'Check for "amber"' },
      { type: "contains", value: '"green"', msg: 'Check for "green"' },
      { type: "contains", value: 'Stop', msg: 'Print "Stop" for red' },
      { type: "contains", value: 'Go', msg: 'Print "Go" for green' }
    ],
    hint: 'Use if/elif/elif/else. Compare with == e.g. if colour == "red":',
    expectedOutput: 'What colour is the light? \nStop / Get ready / Go / Invalid colour'
  },
  {
    id: 18, topic: "Selection", type: "code",
    title: "Final Challenge: Quiz Game",
    description: "Create a mini quiz! Ask <code>\"What is the capital of France? \"</code>. If the answer is <code>\"Paris\"</code>, print <code>\"Correct!\"</code>. Otherwise, print <code>\"Wrong! The answer is Paris\"</code>.",
    starterCode: '# Build your quiz question\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask the question" },
      { type: "contains", value: 'if', msg: "Use an if statement to check the answer" },
      { type: "contains", value: '"Paris"', msg: 'Check if the answer is "Paris"' },
      { type: "contains", value: 'Correct', msg: 'Print "Correct!" for the right answer' },
      { type: "contains", value: 'else', msg: "Use else for wrong answers" },
      { type: "contains", value: 'Wrong', msg: 'Print a message for wrong answers' }
    ],
    hint: 'answer = input("What is the capital of France? ") then use if answer == "Paris":',
    expectedOutput: 'What is the capital of France? \nCorrect! / Wrong! The answer is Paris'
  }
];

// ===================== STATE =====================
let currentIndex = 0;
let completed = {};  // { exerciseId: true/false }
let attempts = {};   // { exerciseId: number }

// ===================== RENDER SIDEBAR =====================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<h2>Exercises</h2>';
  let currentTopic = '';

  exercises.forEach((ex, i) => {
    if (ex.topic !== currentTopic) {
      currentTopic = ex.topic;
      html += `<div class="topic-group"><div class="topic-label">${currentTopic}</div>`;
    }
    const statusClass = completed[ex.id] === true ? 'completed' : completed[ex.id] === false ? 'wrong' : '';
    const activeClass = i === currentIndex ? 'active' : '';
    html += `<div class="sidebar-item ${activeClass}" onclick="goTo(${i})">
      <span class="status-dot ${statusClass}"></span>
      ${ex.id}. ${ex.title}
    </div>`;
    // close topic group at end or topic change
    if (i === exercises.length - 1 || exercises[i + 1].topic !== currentTopic) {
      html += '</div>';
    }
  });

  sb.innerHTML = html;
}

// ===================== RENDER EXERCISE =====================
function renderExercise() {
  const ex = exercises[currentIndex];
  const main = document.getElementById('mainContent');

  const typeTag = ex.type === 'fill' ? '<span class="tag fill">Fill in the Blanks</span>' : '<span class="tag code">Write Code</span>';

  let editorHTML = '';
  if (ex.type === 'fill') {
    let linesHTML = '';
    ex.lines.forEach((line, li) => {
      if (line.blank === '') {
        // Non-editable line
        linesHTML += `<span class="code-line">${escapeHTML(line.before)}${escapeHTML(line.after)}</span>`;
      } else {
        const w = Math.max(line.blank.length * 10 + 20, 80);
        linesHTML += `<span class="code-line">${escapeHTML(line.before)}<input class="blank" data-line="${li}" data-answer="${escapeAttr(line.blank)}" style="width:${w}px" spellcheck="false" autocomplete="off">${escapeHTML(line.after)}</span>`;
      }
    });
    editorHTML = `<div class="fill-editor">${linesHTML}</div>`;
  } else {
    editorHTML = `<textarea class="code-editor" id="codeEditor" spellcheck="false">${escapeHTML(ex.starterCode || '')}</textarea>`;
  }

  let expectedHTML = '';
  if (ex.expectedOutput) {
    expectedHTML = `<div class="expected-output">
      <h4>Expected Output</h4>
      <pre>${escapeHTML(ex.expectedOutput)}</pre>
    </div>`;
  }

  main.innerHTML = `
    <div class="exercise-content">
      <div class="exercise-header">
        ${typeTag}
        <h2>Exercise ${ex.id}: ${ex.title}</h2>
        <p>${ex.description}</p>
      </div>

      <div class="task-box">
        <h3>Your Task</h3>
        <p>${ex.type === 'fill' ? 'Fill in the blanks to complete the code below.' : 'Write the complete code in the editor below.'}</p>
      </div>

      <div class="editor-area">
        <div class="editor-tab-bar">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <span>exercise_${ex.id}.py</span>
        </div>
        ${editorHTML}
      </div>

      ${expectedHTML}

      <div class="btn-row">
        <button class="btn btn-prev" onclick="prev()" ${currentIndex === 0 ? 'disabled' : ''}>Previous</button>
        <button class="btn btn-check" onclick="checkAnswer()">Check Answer</button>
        <button class="btn btn-next" onclick="next()" id="nextBtn">${currentIndex === exercises.length - 1 ? 'Finish' : 'Next'}</button>
        <button class="btn btn-hint" onclick="showHint()">Hint</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>
  `;

  // Focus first blank or editor
  requestAnimationFrame(() => {
    const firstBlank = main.querySelector('input.blank');
    const editor = document.getElementById('codeEditor');
    if (firstBlank) firstBlank.focus();
    else if (editor) editor.focus();
  });

  renderSidebar();
  updateProgress();
}

// ===================== CHECK ANSWER =====================
function checkAnswer() {
  const ex = exercises[currentIndex];
  const fb = document.getElementById('feedback');

  if (ex.type === 'fill') {
    const blanks = document.querySelectorAll('input.blank');
    let allCorrect = true;
    blanks.forEach(b => {
      const answer = b.dataset.answer.trim().toLowerCase();
      const userVal = b.value.trim().toLowerCase();
      if (userVal === answer) {
        b.classList.remove('wrong');
        b.classList.add('correct');
      } else {
        b.classList.remove('correct');
        b.classList.add('wrong');
        allCorrect = false;
      }
    });

    if (allCorrect) {
      completed[ex.id] = true;
      fb.className = 'feedback success';
      fb.textContent = 'Correct! Well done!';
    } else {
      completed[ex.id] = false;
      fb.className = 'feedback error';
      fb.textContent = 'Not quite right. Check the highlighted blanks and try again.';
    }
  } else {
    // Code type
    const editor = document.getElementById('codeEditor');
    const code = editor.value;

    if (code.trim() === '' || code.trim() === (ex.starterCode || '').trim()) {
      fb.className = 'feedback error';
      fb.textContent = 'Write your code first, then check!';
      return;
    }

    // Check for output_match type
    const outputCheck = ex.checks.find(c => c.type === 'output_match');
    if (outputCheck) {
      // For output match, check that the print statements contain the right text
      const prints = extractPrintContents(code);
      const expectedLines = outputCheck.value.split('\n');
      let matched = true;
      for (const line of expectedLines) {
        const found = prints.some(p => p.toLowerCase().includes(line.toLowerCase()));
        if (!found) { matched = false; break; }
      }
      if (matched) {
        completed[ex.id] = true;
        fb.className = 'feedback success';
        fb.textContent = 'Correct! Your code looks great!';
      } else {
        completed[ex.id] = false;
        fb.className = 'feedback error';
        fb.textContent = `Check your print statements. Expected output:\n${outputCheck.value}`;
      }
      renderSidebar();
      updateProgress();
      return;
    }

    // Contains checks
    let allPass = true;
    let failMsg = '';
    for (const check of ex.checks) {
      if (check.type === 'contains') {
        if (!code.includes(check.value)) {
          allPass = false;
          failMsg = check.msg;
          break;
        }
      }
    }

    if (allPass) {
      completed[ex.id] = true;
      fb.className = 'feedback success';
      fb.textContent = 'Correct! Well done!';
    } else {
      completed[ex.id] = false;
      fb.className = 'feedback error';
      fb.textContent = failMsg || 'Not quite right. Check the requirements and try again.';
    }
  }

  renderSidebar();
  updateProgress();
}

function extractPrintContents(code) {
  const matches = [];
  const regex = /print\s*\(\s*["']([^"']*)["']\s*\)/g;
  let m;
  while ((m = regex.exec(code)) !== null) {
    matches.push(m[1]);
  }
  return matches;
}

// ===================== HINT =====================
function showHint() {
  const ex = exercises[currentIndex];
  const fb = document.getElementById('feedback');
  fb.className = 'feedback hint';
  fb.textContent = ex.hint;
}

// ===================== NAVIGATION =====================
function goTo(index) {
  currentIndex = index;
  renderExercise();
}

function next() {
  if (currentIndex < exercises.length - 1) {
    currentIndex++;
    renderExercise();
  } else {
    showCompletion();
  }
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderExercise();
  }
}

// ===================== PROGRESS =====================
function updateProgress() {
  const total = exercises.length;
  const done = Object.values(completed).filter(v => v === true).length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;

  const totalAttempted = Object.keys(completed).length;
  document.getElementById('scoreBadge').textContent = `Score: ${done} / ${totalAttempted || 0}`;
}

// ===================== COMPLETION SCREEN =====================
function showCompletion() {
  const total = exercises.length;
  const done = Object.values(completed).filter(v => v === true).length;
  const pct = Math.round((done / total) * 100);

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="completion-screen show">
      <div class="trophy">&#127942;</div>
      <h2>Course Complete!</h2>
      <p>You've finished all ${total} exercises.</p>
      <div class="final-score">${done} / ${total}</div>
      <p>${pct >= 80 ? "Excellent work! You're ready for the test." : pct >= 50 ? "Good effort! Review the topics you missed." : "Keep practising! Try the exercises you missed again."}</p>
      <button class="btn btn-restart" onclick="restart()">Restart Course</button>
    </div>
  `;
}

function restart() {
  currentIndex = 0;
  completed = {};
  attempts = {};
  renderExercise();
}

// ===================== UTILS =====================
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ===================== INIT =====================
renderExercise();
</script>

</body>
</html>
