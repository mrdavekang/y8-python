<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS3 Python Practice Course</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f7fb;
    --surface: #ffffff;
    --surface2: #eef3fb;
    --accent: #4f46e5;
    --accent-light: #6366f1;
    --green: #2e7d32;
    --green-bg: #e8f5e9;
    --red: #c62828;
    --red-bg: #fdecea;
    --text: #1f2937;
    --text-dim: #64748b;
    --border: #d8e1ef;
    --code-bg: #f8fafc;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at top left, #ffffff 0%, #f4f7fb 42%, #edf3fb 100%);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Top Bar ---- */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar h1 span.icon { font-size: 22px; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-outer {
    width: 200px;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 13px;
    color: var(--text-dim);
    min-width: 90px;
    text-align: right;
  }
  .score-badge {
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-light);
  }

  /* ---- Layout ---- */
  .main-container {
    display: flex;
    height: calc(100vh - 53px);
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .topic-group { margin-bottom: 16px; }
  .topic-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-light);
    padding: 8px 16px 4px;
    font-weight: 700;
  }
  .sidebar-item {
    padding: 8px 16px 8px 28px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    color: var(--text-dim);
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active {
    background: var(--surface2);
    color: var(--text);
    font-weight: 600;
  }
  .sidebar-item .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .sidebar-item .status-dot.completed { background: var(--green); }
  .sidebar-item .status-dot.wrong { background: var(--red); }

  /* ---- Content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
  }

  .exercise-header {
    margin-bottom: 24px;
  }
  .exercise-header .tag {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .exercise-header .tag.fill { background: #e67e22; }
  .exercise-header .tag.code { background: var(--accent); }
  .exercise-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .exercise-header p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ---- Task Box ---- */
  .task-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .task-box h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--accent-light);
  }
  .task-box p, .task-box ul {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
  }
  .task-box ul { padding-left: 20px; }
  .task-box li { margin-bottom: 4px; }
  .task-box code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: #b45309;
  }

  /* ---- Code Editor Area ---- */
  .editor-area {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .editor-tab-bar {
    background: var(--surface);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .editor-tab-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
  .editor-tab-bar .dot.r { background: #ff5f57; }
  .editor-tab-bar .dot.y { background: #ffbd2e; }
  .editor-tab-bar .dot.g { background: #28c840; }
  .editor-tab-bar span { margin-left: 8px; }

  /* Fill-in-the-blank editor */
  .fill-editor {
    padding: 20px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 2;
    color: var(--text);
  }
  .fill-editor .code-line {
    white-space: pre;
    display: block;
  }
  .fill-editor input.blank {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    padding: 2px 8px;
    width: auto;
    min-width: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .fill-editor input.blank:focus {
    border-color: var(--accent);
  }
  .fill-editor input.blank.correct {
    border-color: var(--green);
    background: var(--green-bg);
  }
  .fill-editor input.blank.wrong {
    border-color: var(--red);
    background: var(--red-bg);
  }

  /* Full code editor */
  textarea.code-editor {
    width: 100%;
    min-height: 160px;
    background: var(--code-bg);
    color: var(--text);
    border: none;
    padding: 20px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    tab-size: 4;
  }
  textarea.stdin-editor {
    width: 100%;
    min-height: 120px;
    background: var(--code-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
  }
  textarea.stdin-editor:focus {
    border-color: var(--accent);
  }
  textarea.runner-code-editor {
    width: 100%;
    min-height: 180px;
    background: var(--code-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    tab-size: 4;
    margin-bottom: 12px;
  }
  textarea.runner-code-editor:focus {
    border-color: var(--accent);
  }

  /* ---- Python Runner ---- */
  .runner-grid {
    display: grid;
    grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  .runner-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .runner-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .runner-header h4 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .runtime-status {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: var(--surface2);
    white-space: nowrap;
  }
  .runtime-status.idle {
    color: var(--text-dim);
  }
  .runtime-status.loading,
  .runtime-status.running {
    color: #1565c0;
    border-color: #2196f3;
    background: #e3f2fd;
  }
  .runtime-status.ready {
    color: #2e7d32;
    border-color: var(--green);
    background: var(--green-bg);
  }
  .runtime-status.error {
    color: #c62828;
    border-color: var(--red);
    background: var(--red-bg);
  }
  .runner-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .runner-help {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .runner-buttons {
    margin-top: 12px;
  }
  .runner-console {
    min-height: 244px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    overflow: auto;
  }
  .runner-console.placeholder {
    color: var(--text-dim);
  }

  /* ---- Expected Output ---- */
  .expected-output {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .expected-output h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .expected-output pre {
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: var(--green);
    white-space: pre-wrap;
  }

  /* ---- Buttons ---- */
  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-check {
    background: var(--accent);
    color: #fff;
  }
  .btn-check:hover { background: var(--accent-light); }
  .btn-run {
    background: #2196f3;
    color: #fff;
  }
  .btn-run:hover { filter: brightness(1.07); }
  .btn-next {
    background: var(--green);
    color: #fff;
  }
  .btn-next:hover { opacity: 0.9; }
  .btn-prev {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-prev:hover { background: var(--surface); }
  .btn-hint {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    margin-left: auto;
  }
  .btn-hint:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn-clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--text); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---- Feedback ---- */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
    white-space: pre-wrap;
  }
  .feedback.success {
    display: block;
    background: var(--green-bg);
    border: 1px solid var(--green);
    color: #2e7d32;
  }
  .feedback.error {
    display: block;
    background: var(--red-bg);
    border: 1px solid var(--red);
    color: #c62828;
  }
  .feedback.hint {
    display: block;
    background: #e3f2fd;
    border: 1px solid #2196f3;
    color: #1565c0;
  }

  /* ---- Completion Screen ---- */
  .completion-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex: 1;
    padding: 40px;
  }
  .completion-screen.show { display: flex; }
  .completion-screen .trophy { font-size: 64px; margin-bottom: 20px; }
  .completion-screen h2 { font-size: 28px; margin-bottom: 12px; }
  .completion-screen p { color: var(--text-dim); font-size: 16px; margin-bottom: 8px; }
  .completion-screen .final-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--accent-light);
    margin: 20px 0;
  }
  .btn-restart {
    background: var(--accent);
    color: #fff;
    margin-top: 20px;
  }

  /* ---- Responsive ---- */
  @media (max-width: 800px) {
    .sidebar { display: none; }
    .content { padding: 20px 16px; }
    .progress-bar-outer { width: 120px; }
  }
  @media (max-width: 980px) {
    .runner-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <h1><span class="icon">&#128013;</span> KS3 Python Practice</h1>
  <div class="progress-wrap">
    <div class="score-badge" id="scoreBadge">Score: 0 / 0</div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 18</div>
  </div>
</div>

<div class="main-container">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main Content -->
  <main class="content" id="mainContent">
    <!-- Exercise content rendered by JS -->
  </main>
</div>

<script>
// ===================== EXERCISE DATA =====================
const exercises = [
  // ---- TOPIC 1: VARIABLES ----
  {
    id: 1, topic: "Variables", type: "fill",
    title: "Storing a Name",
    description: "Variables let us store data. Complete the code to store the name <code>\"Alice\"</code> in a variable called <code>name</code>.",
    lines: [
      { before: '', blank: 'name', after: ' = "Alice"' },
      { before: 'print(', blank: 'name', after: ')' }
    ],
    hint: "A variable is created by writing its name, then = , then the value.",
    expectedOutput: "Alice"
  },
  {
    id: 2, topic: "Variables", type: "fill",
    title: "Storing a Number",
    description: "Store the number <code>25</code> in a variable called <code>age</code>, then print it.",
    lines: [
      { before: 'age = ', blank: '25', after: '' },
      { before: '', blank: 'print', after: '(age)' }
    ],
    hint: "Numbers don't need quotes around them. Use print() to display values.",
    expectedOutput: "25"
  },
  {
    id: 3, topic: "Variables", type: "code",
    title: "Create Two Variables",
    description: "Create a variable <code>subject</code> with the value <code>\"Computing\"</code> and a variable <code>room</code> with the value <code>12</code>. Print both on separate lines.",
    starterCode: '# Create your variables below\n\n\n# Print them\n',
    checks: [
      { type: "contains", value: 'subject', msg: "You need a variable called subject" },
      { type: "contains", value: '"Computing"', msg: "subject should store \"Computing\"" },
      { type: "contains", value: 'room', msg: "You need a variable called room" },
      { type: "contains", value: '12', msg: "room should store 12" },
      { type: "contains", value: 'print', msg: "Use print() to display the values" }
    ],
    hint: "Remember: text values need quotes, numbers don't. Use print(variable_name).",
    expectedOutput: "Computing\n12"
  },

  // ---- TOPIC 2: PRINT ----
  {
    id: 4, topic: "Print", type: "fill",
    title: "Hello World!",
    description: "The <code>print()</code> function displays text on screen. Complete the classic first program!",
    lines: [
      { before: '', blank: 'print', after: '("Hello World!")' }
    ],
    hint: "The function that displays output is called print.",
    expectedOutput: "Hello World!"
  },
  {
    id: 5, topic: "Print", type: "fill",
    title: "Printing Multiple Items",
    description: "You can print text and variables together using commas. Fill in the blanks.",
    lines: [
      { before: 'name = "Bob"', blank: '', after: '' },
      { before: 'print("Hello,", ', blank: 'name', after: ')' }
    ],
    hint: "Put the variable name (without quotes) after the comma inside print().",
    expectedOutput: "Hello, Bob"
  },
  {
    id: 6, topic: "Print", type: "code",
    title: "Your Own Message",
    description: "Write code that prints <code>I am learning Python</code> on the first line and <code>It is fun!</code> on the second line. Use two print statements.",
    starterCode: '# Write your two print statements below\n',
    checks: [
      { type: "output_match", value: 'I am learning Python\nIt is fun!' }
    ],
    hint: "Use two separate print() calls, each with the text in quotes.",
    expectedOutput: "I am learning Python\nIt is fun!"
  },

  // ---- TOPIC 3: INPUT ----
  {
    id: 7, topic: "Input", type: "fill",
    title: "Asking for a Name",
    description: "<code>input()</code> asks the user to type something. Complete the code to ask for the user's name and store it.",
    lines: [
      { before: 'name = ', blank: 'input', after: '("What is your name? ")' },
      { before: 'print("Hello,", ', blank: 'name', after: ')' }
    ],
    hint: "The function that reads user input is called input.",
    expectedOutput: "What is your name? \nHello, [user's name]"
  },
  {
    id: 8, topic: "Input", type: "fill",
    title: "Asking for a Favourite Colour",
    description: "Complete the code so it asks for a colour and prints a message.",
    lines: [
      { before: '', blank: 'colour', after: ' = input("What is your favourite colour? ")' },
      { before: 'print("Nice!", ', blank: 'colour', after: ', "is a great colour!")' }
    ],
    hint: "Store the result of input() in a variable called colour.",
    expectedOutput: "What is your favourite colour? \nNice! [colour] is a great colour!"
  },
  {
    id: 9, topic: "Input", type: "code",
    title: "Ask and Greet",
    description: "Write a program that asks <code>\"What is your hobby? \"</code> and stores the answer in a variable called <code>hobby</code>. Then prints <code>\"Cool! You like\"</code> followed by the hobby.",
    starterCode: '# Ask for the hobby and print the message\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask the user" },
      { type: "contains", value: 'hobby', msg: "Store the answer in a variable called hobby" },
      { type: "contains", value: '"What is your hobby? "', msg: 'The prompt should be exactly "What is your hobby? "' },
      { type: "contains", value: 'print', msg: "Use print() to display the output" }
    ],
    hint: 'Use: hobby = input("What is your hobby? ") then print("Cool! You like", hobby)',
    expectedOutput: 'What is your hobby? \nCool! You like [hobby]'
  },

  // ---- TOPIC 4: DATA TYPES (int, str, float) ----
  {
    id: 10, topic: "Data Types", type: "fill",
    title: "Converting to Integer",
    description: "<code>input()</code> always gives us a <strong>string</strong>. To do maths, we need to convert it to an <strong>integer</strong> using <code>int()</code>.",
    lines: [
      { before: 'age_text = input("Enter your age: ")', blank: '', after: '' },
      { before: 'age = ', blank: 'int', after: '(age_text)' },
      { before: 'print("Next year you will be", age ', blank: '+', after: ' 1)' }
    ],
    hint: "int() converts a string to a whole number. Use + to add numbers.",
    expectedOutput: "Enter your age: \nNext year you will be [age+1]"
  },
  {
    id: 11, topic: "Data Types", type: "fill",
    title: "String or Integer?",
    description: "Fix this code! The number needs to be converted so the addition works properly.",
    lines: [
      { before: 'num1 = ', blank: 'int', after: '(input("Enter a number: "))' },
      { before: 'result = num1 + 10', blank: '', after: '' },
      { before: 'print("Result:", ', blank: 'result', after: ')' }
    ],
    hint: "Wrap input() inside int() to convert the text into a number immediately.",
    expectedOutput: "Enter a number: \nResult: [num + 10]"
  },
  {
    id: 12, topic: "Data Types", type: "code",
    title: "Build a Calculator",
    description: "Ask the user for two numbers (<code>\"Enter number 1: \"</code> and <code>\"Enter number 2: \"</code>). Convert both to integers, add them together, and print the result with the message <code>\"The total is\"</code>.",
    starterCode: '# Ask for two numbers, convert, add, and print\n',
    checks: [
      { type: "contains", value: 'input', msg: "Use input() to ask for numbers" },
      { type: "contains", value: 'int', msg: "Convert the inputs to integers using int()" },
      { type: "contains", value: '+', msg: "Add the two numbers together using +" },
      { type: "contains", value: 'print', msg: "Print the result" },
      { type: "contains", value: 'The total is', msg: 'Include the message "The total is"' }
    ],
    hint: 'Pattern: num1 = int(input("Enter number 1: "))',
    expectedOutput: 'Enter number 1: \nEnter number 2: \nThe total is [sum]'
  },

  // ---- TOPIC 5: SELECTION (if / elif / else) ----
  {
    id: 13, topic: "Selection", type: "fill",
    title: "Simple If Statement",
    description: "An <code>if</code> statement checks a condition. If it's <strong>True</strong>, the indented code runs.",
    lines: [
      { before: 'temperature = 35', blank: '', after: '' },
      { before: '', blank: 'if', after: ' temperature > 30:' },
      { before: '    print("', blank: "It's hot!", after: '")' }

async function checkAnswer() {
  const ex = exercises[currentIndex];
  const fb = document.getElementById('feedback');

  if (ex.type === 'fill') {
    const blanks = document.querySelectorAll('input.blank');
    let allCorrect = true;
    blanks.forEach(b => {
      const answer = b.dataset.answer.trim().toLowerCase();
      const userVal = b.value.trim().toLowerCase();
      if (userVal === answer) {
        b.classList.remove('wrong');
        b.classList.add('correct');
      } else {
        b.classList.remove('correct');
        b.classList.add('wrong');
        allCorrect = false;
      }
    });

    if (allCorrect) {
      completed[ex.id] = true;
      fb.className = 'feedback success';
      fb.textContent = 'Correct! Well done!';
    } else {
      completed[ex.id] = false;
      fb.className = 'feedback error';
      fb.textContent = 'Not quite right. Check the highlighted blanks and try again.';
    }
  } else {
    // Code type
    const editor = document.getElementById('codeEditor');
    const code = editor.value;

    if (code.trim() === '' || code.trim() === (ex.starterCode || '').trim()) {
      fb.className = 'feedback error';
      fb.textContent = 'Write your code first, then check!';
      return;
    }

    const containsFailure = findContainsFailure(ex, code);
    if (containsFailure) {
      completed[ex.id] = false;
      fb.className = 'feedback error';
      fb.textContent = containsFailure;
    } else {
      runnerBusy = true;
      syncRuntimeControls();

      try {
        const runtimeResult = await runExerciseCases(ex, code);
        if (runtimeResult.ok) {
          completed[ex.id] = true;
          fb.className = 'feedback success';
          fb.textContent = 'Correct! Your code passed the Python checks.';
        } else {
          completed[ex.id] = false;
          fb.className = 'feedback error';
          fb.textContent = runtimeResult.message;
        }
      } catch (error) {
        completed[ex.id] = false;
        fb.className = 'feedback error';
        fb.textContent = `The Python runner could not start: ${error.message || error}`;
      } finally {
        runnerBusy = false;
        syncRuntimeControls();
      }
    }

    if (completed[ex.id]) {
      completed[ex.id] = true;
      fb.className = 'feedback success';
      fb.textContent = fb.textContent || 'Correct! Well done!';
    }
  }

  renderSidebar();
  updateProgress();
}

function getDefaultInput(ex) {
  const firstCase = ex.runCases && ex.runCases[0];
  return firstCase ? firstCase.inputs.join('\n') : '';
}

function getDefaultRunnerCode(ex) {
  if (ex.type === 'code') {
    return ex.starterCode || '';
  }

  return '# Type Python here, or click "Load Exercise Code"\n';
}

function getWorkState(ex) {
  if (!work[ex.id]) {
    work[ex.id] = {
      code: ex.starterCode || '',
      runnerCode: getDefaultRunnerCode(ex),
      blanks: {},
      stdin: getDefaultInput(ex),
      console: ''
    };
  }

  if (typeof work[ex.id].code !== 'string') work[ex.id].code = ex.starterCode || '';
  if (typeof work[ex.id].runnerCode !== 'string') work[ex.id].runnerCode = getDefaultRunnerCode(ex);
  if (!work[ex.id].blanks) work[ex.id].blanks = {};
  if (typeof work[ex.id].stdin !== 'string') work[ex.id].stdin = getDefaultInput(ex);
  if (typeof work[ex.id].console !== 'string') work[ex.id].console = '';

  return work[ex.id];
}

function getWorkStateById(exId) {
  const exercise = exercises.find(ex => ex.id === Number(exId));
  return exercise ? getWorkState(exercise) : null;
}

function saveCode(exId, value) {

function saveRunnerCode(exId, value) {

function saveBlank(exId, lineIndex, value) {

function saveStdin(exId, value) {

function insertTextAtCursor(field, text) {
  const start = field.selectionStart;
  const end = field.selectionEnd;
  field.setRangeText(text, start, end, 'end');
  field.dispatchEvent(new Event('input', { bubbles: true }));
}

function handleEditorKeydown(event) {
  if (event.key === 'Tab') {
    event.preventDefault();
    insertTextAtCursor(event.target, '    ');
    return;
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    if (event.target && event.target.id === 'codeEditor') {
      saveRunnerCode(exercises[currentIndex].id, event.target.value);
      const runnerEditor = document.getElementById('runnerCodeEditor');
      if (runnerEditor) runnerEditor.value = event.target.value;
    }
    runCurrentCode();
  }
}

function handleRunnerKeydown(event) {
  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    runCurrentCode();
  }
}

function buildExerciseCode(ex) {

      return `${line.before}${filled}${line.after}`;

  return state.code;
}

function syncRuntimeControls() {

async function loadPyodideScript() {
  if (typeof window.loadPyodide === 'function') return;

  await new Promise((resolve, reject) => {
    const existing = document.querySelector('script[data-pyodide="true"]');

    if (existing) {
      existing.addEventListener('load', resolve, { once: true });
      existing.addEventListener('error', () => reject(new Error('Could not load Pyodide.')), { once: true });
      return;
    }

    const script = document.createElement('script');
    script.src = `${PYODIDE_BASE_URL}pyodide.js`;
    script.async = true;
    script.dataset.pyodide = 'true';
    script.onload = resolve;
    script.onerror = () => reject(new Error('Could not load Pyodide from the CDN.'));
    document.head.appendChild(script);
  });
}

async function ensurePyodide() {
  if (pyodideReady && pyodidePromise) {
    return pyodidePromise;
  }

  if (!pyodidePromise) {
    pyodideLoading = true;
    pyodideError = '';
    syncRuntimeControls();

    pyodidePromise = (async () => {
      await loadPyodideScript();
      const runtime = await window.loadPyodide({ indexURL: PYODIDE_BASE_URL });
      pyodideReady = true;
      return runtime;
    })().catch(error => {
      pyodidePromise = null;
      pyodideReady = false;
      pyodideError = error.message || 'Could not start the Python runner.';
      throw error;
    }).finally(() => {
      pyodideLoading = false;
      syncRuntimeControls();
    });
  }

  return pyodidePromise;
}

function createRuntimeSession(exId, inputLines, showInConsole) {
  const session = {
    exId: Number(exId),
    inputQueue: [...(inputLines || [])],
    inputIndex: 0,
    output: '',
    missingInput: false,
    hadError: false,
    showInConsole,
    write(chunk) {
      if (!chunk) return;
      this.output += chunk;
      if (this.showInConsole) {
        setConsoleOutput(this.exId, this.output);
      }
    },
    read(prompt = '') {
      if (prompt) this.write(prompt);

      const nextValue = this.inputQueue[this.inputIndex];
      if (typeof nextValue === 'undefined') {
        this.missingInput = true;
        this.write('[No more input provided]\n');
        return '';
      }

      this.inputIndex += 1;
      this.write(`${nextValue}\n`);
      return nextValue;
    },
    markError() {
      this.hadError = true;
    }
  };

  if (showInConsole) {
    setConsoleOutput(exId, '');
  }

  return session;
}

window.pyWrite = function(chunk) {
  if (activeRuntimeSession) activeRuntimeSession.write(chunk);
};

window.pyInput = function(prompt) {
  return activeRuntimeSession ? activeRuntimeSession.read(prompt || '') : '';
};

window.pyMarkError = function() {
  if (activeRuntimeSession) activeRuntimeSession.markError();
};

async function executePython(code, inputLines, options = {}) {
  const pyodide = await ensurePyodide();
  const session = createRuntimeSession(options.exerciseId, inputLines, Boolean(options.showInConsole));

  activeRuntimeSession = session;
  window.__studentCode = code;

  try {
    await pyodide.runPythonAsync(PYTHON_RUNNER_WRAPPER);
  } catch (error) {
    session.hadError = true;
    session.write(`Runner error: ${error.message || error}\n`);
  } finally {
    activeRuntimeSession = null;
    delete window.__studentCode;
  }

  return {
    ok: !session.hadError && !session.missingInput,
    output: session.output,
    hadError: session.hadError,
    missingInput: session.missingInput
  };
}

async function runCurrentCode() {
  if (runnerBusy) return;

  const ex = exercises[currentIndex];
  const state = getWorkState(ex);
  const code = state.runnerCode;

  if (code.trim() === '') {
    setConsoleOutput(ex.id, 'Type some Python in the runner first, then click Run Code.');
    return;
  }

  runnerBusy = true;
  syncRuntimeControls();

  try {
    const inputLines = state.stdin === '' ? [] : state.stdin.split(/\r?\n/);
    const result = await executePython(code, inputLines, { exerciseId: ex.id, showInConsole: true });

    if (!result.output) {
      setConsoleOutput(ex.id, '[Program finished with no output]');
    }
  } catch (error) {
    setConsoleOutput(ex.id, `Runner unavailable: ${error.message || error}`);
  } finally {
    runnerBusy = false;
    syncRuntimeControls();
  }
}

function findContainsFailure(ex, code) {
  if (!Array.isArray(ex.checks)) return '';

  for (const check of ex.checks) {
    if (check.type === 'contains' && !code.includes(check.value)) {
      return check.msg;
    }
  }

  return '';
}

function loadRunCaseInput(exId, inputs) {
  const state = getWorkStateById(exId);
  if (!state) return;

  state.stdin = (inputs || []).join('\n');

  const currentExercise = exercises[currentIndex];
  if (!currentExercise || currentExercise.id !== Number(exId)) return;

  const stdinEditor = document.getElementById('stdinEditor');
  if (stdinEditor) stdinEditor.value = state.stdin;
}

function buildMismatchMessage(runCase, expected, actual) {
  const inputSummary = runCase.inputs && runCase.inputs.length
    ? `Test input:\n${runCase.inputs.join('\n')}\n\n`
    : '';

  return `Your code ran, but the output did not match this test.\n\n${inputSummary}Expected:\n${expected || '[no output]'}\n\nGot:\n${actual || '[no output]'}`;
}

async function runExerciseCases(ex, code) {
  if (!ex.runCases || !ex.runCases.length) {
    return { ok: true };
  }

  for (const runCase of ex.runCases) {
    const result = await executePython(code, runCase.inputs || [], { exerciseId: ex.id, showInConsole: false });

    if (result.missingInput) {
      loadRunCaseInput(ex.id, runCase.inputs || []);
      setConsoleOutput(ex.id, result.output || '[Program finished with no output]');
      return {
        ok: false,
        message: 'Your program asked for more input than this test provided. I loaded the test input into Program Input so you can run it and debug.'
      };
    }

    if (result.hadError) {
      loadRunCaseInput(ex.id, runCase.inputs || []);
      setConsoleOutput(ex.id, result.output || '[Program finished with no output]');
      return {
        ok: false,
        message: 'Your code hit an error while running. I loaded the test input into Program Input so you can run it below and fix the problem.'
      };
    }

    const actual = normalizeConsoleText(result.output);
    const expected = normalizeConsoleText(runCase.expected);

    if (actual !== expected) {
      loadRunCaseInput(ex.id, runCase.inputs || []);
      setConsoleOutput(ex.id, result.output || '[Program finished with no output]');
      return {
        ok: false,
        message: buildMismatchMessage(runCase, expected, actual)
      };
    }
  }

  return { ok: true };
}

// ===================== HINT =====================
function showHint() {
  const ex = exercises[currentIndex];
  const fb = document.getElementById('feedback');
  fb.className = 'feedback hint';
  fb.textContent = ex.hint;
}

// ===================== NAVIGATION =====================
function goTo(index) {
  currentIndex = index;
  renderExercise();
}

function next() {
  if (currentIndex < exercises.length - 1) {
    currentIndex++;
    renderExercise();
  } else {
    showCompletion();
  }
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderExercise();
  }
}

// ===================== PROGRESS =====================
function updateProgress() {
  const total = exercises.length;
  const done = Object.values(completed).filter(v => v === true).length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;

  const totalAttempted = Object.keys(completed).length;
  document.getElementById('scoreBadge').textContent = `Score: ${done} / ${totalAttempted || 0}`;
}

// ===================== COMPLETION SCREEN =====================
function showCompletion() {
  const total = exercises.length;
  const done = Object.values(completed).filter(v => v === true).length;
  const pct = Math.round((done / total) * 100);

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="completion-screen show">
      <div class="trophy">&#127942;</div>
      <h2>Course Complete!</h2>
      <p>You've finished all ${total} exercises.</p>
      <div class="final-score">${done} / ${total}</div>
      <p>${pct >= 80 ? "Excellent work! You're ready for the test." : pct >= 50 ? "Good effort! Review the topics you missed." : "Keep practising! Try the exercises you missed again."}</p>
      <button class="btn btn-restart" onclick="restart()">Restart Course</button>
    </div>
  `;
}

function restart() {
  currentIndex = 0;
  completed = {};
  attempts = {};
  work = {};
  renderExercise();
}

// ===================== UTILS =====================
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ===================== INIT =====================
renderExercise();
</script>
